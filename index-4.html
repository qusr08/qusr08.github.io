<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank Alfano | Home Page</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            margin: 0;
        }

        body {
            min-height: 100vh;
            background-color: #121212;
            padding: 20px 5vw;
            padding-bottom: 20vh;
        }

        .project-list {
            display: flex;
            flex-flow: column;
            gap: 10vh;
            align-items: center;
        }

        .project {
            position: relative;
            display: flex;
            flex-flow: column;
            gap: 1em;
            height: 90vh;
            width: 100%;
        }

        .project-video {
            position: absolute;
            /* background-color: #6fc4c7; */
            background-position: center;
            background-size: cover;
            width: 65%;
            height: 75%;
            left: 17.5%;
            top: 12.5%;
            z-index: -1;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
        }

        .project-title {
            color: #FAFAFA;
            font-size: 10em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -8px;
            max-height: 1em;
            filter: drop-shadow(10px 10px 0px #121212);
        }

        .project-description {
            color: #FAFAFA;
            font-size: 2em;
            width: 25%;
            font-weight: 700;
            filter: drop-shadow(2px 2px 0px #121212);
        }

        .project-tags {
            display: flex;
            flex-flow: row-reverse wrap;
            gap: 1em;
        }

        .project-tag {
            color: #121212;
            background-color: #FAFAFA;
            padding: 0.25em 0.5em;
            font-size: 1.5em;
            font-weight: 700;
        }

        .project-awards {
            width: 25%;
            color: #FAFAFA;
            font-size: 2em;
            font-weight: 700;
            filter: drop-shadow(2px 2px 0px #121212);
        }

        .gmtk-2022 {
            background-color: unset;
            background-image: linear-gradient(to left, #FF9C00, #FF0900);
            color: #FAFAFA;
        }
    </style>
    <script type="module" src="js/index.js"></script>
</head>

<body>
    <div class="project-list">
        <div class="project">
            <div class="project-video wobble-effect" style="background-image: url('png/breakthrough/breakthrough-title-background.png')"></div>
            <p class="project-title">Breakthrough</p>
            <p class="project-description">A Tetris-inspired arcade puzzle game where you destroy blocks to clear boards</p>
            <p class="project-awards">Won the <span style="color: #eeea0c">Game Feel Award</span> at RIT EDGE 2022</p>
            <div style="flex-grow: 1;"></div>
            <div class="project-tags">
                <p class="project-tag wobble-effect">Unity</p>
                <p class="project-tag wobble-effect">C#</p>
                <p class="project-tag wobble-effect">Puzzle</p>
                <p class="project-tag wobble-effect">Arcade</p>
            </div>
        </div>
    </div>
</body>

</html>
